name: Build Docker images
on:
  workflow_run:
    workflows: ["Check Version and Release"]
    types:
      - completed
    branches:
      - tags/v0.1.8

jobs:
  check_workflow_and_ref:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      is_tag: ${{ steps.check_ref.outputs.is_tag }}
      tag_name: ${{ steps.check_ref.outputs.tag_name }}
    steps:
      - name: Check if workflow triggered by tag
        id: check_ref
        run: |
          echo "head_branch=${{ github.event.workflow_run.head_branch }}"
          # Extract the reference from the triggering workflow
          if [[ "${{ github.event.workflow_run.head_branch }}" == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  next_docker_build_push:
    needs: check_workflow_and_ref
    if: ${{ needs.check_workflow_and_ref.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check_workflow_and_ref.outputs.tag_name }}
      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/investpulse-next
          tags: ${{ needs.check_workflow_and_ref.outputs.tag_name }}
      - name: Build and push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: docker/next/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  nginx_docker_build_push:
    runs-on: ubuntu-latest
    needs: [check_workflow_and_ref, next_docker_build_push]
    if: ${{ needs.check_workflow_and_ref.outputs.is_tag == 'true' }}
    steps:
      - name: Checkout the files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check_workflow_and_ref.outputs.tag_name }}
      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/investpulse-nginx
          tags: ${{ needs.check_workflow_and_ref.outputs.tag_name }},latest
      - name: Build and push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: docker/nginx/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
